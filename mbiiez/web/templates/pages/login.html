<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>MBIIEZ Login</title>
  <link href="/assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #0f1117;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      width: 100%;
      max-width: 460px;
      border: 1px solid #2a2d35;
      border-radius: 14px;
      background: #1a1d24;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.6);
    }
    .login-card .form-control {
      background: #0f1117;
      border-color: #2a2d35;
      color: #e8eaf0;
    }
    .login-card .form-control:focus {
      background: #0f1117;
      border-color: #4e8ef7;
      color: #e8eaf0;
      box-shadow: 0 0 0 0.2rem rgba(78, 142, 247, 0.25);
    }
    .login-card .form-label {
      color: #a0a8b8;
    }
    .hint {
      color: #6b7385;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="card login-card">
    <div class="card-body p-4 p-md-5">
      <div class="text-center mb-4">
        <img src="/assets/img/bootstraper-logo.png" alt="MBIIEZ" style="max-height: 64px; max-width: 220px; object-fit: contain;">
      </div>
      <div class="mb-3 text-center">
        <p class="hint mb-0">Sign in with your panel account.</p>
      </div>

      {% if error %}
      <div class="alert alert-danger py-2">{{ error }}</div>
      {% endif %}

      <form method="post" action="/login">
        <input type="hidden" name="next" value="{{ next_path }}">

        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <input id="username" name="username" class="form-control" autocomplete="username" required>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input id="password" name="password" type="password" class="form-control" autocomplete="current-password" required>
        </div>

        <div class="d-grid">
          <button type="submit" class="btn btn-primary">Sign In</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
