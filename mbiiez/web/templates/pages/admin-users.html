{% extends 'base.html' %}
{% block content %}
<div class="page-header mb-3">
  <h3 class="page-title">Admin Users</h3>
</div>

<div class="row">
  <div class="col-lg-5 mb-4">
    <div class="card">
      <div class="card-body">
        <h5 class="card-title">Add User</h5>
        <form id="add-user-form">
          <div class="mb-2">
            <label class="form-label">Username</label>
            <input type="text" id="add-username" class="form-control" minlength="3" required>
          </div>
          <div class="mb-2">
            <label class="form-label">Password</label>
            <input type="password" id="add-password" class="form-control" minlength="8" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Role</label>
            <select id="add-role" class="form-select">
              <option value="viewer">Viewer</option>
              <option value="mod">Mod</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary">Create User</button>
        </form>
      </div>
    </div>
  </div>

  <div class="col-lg-7 mb-4">
    <div class="card">
      <div class="card-body">
        <h5 class="card-title">Existing Users</h5>
        <div id="status"></div>
        <div class="table-responsive">
          <table class="table table-striped align-middle">
            <thead>
              <tr>
                <th>User</th>
                <th>Role</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              {% for user in view_bag.users %}
              <tr>
                <td>{{ user.username }}</td>
                <td>
                  <div class="d-flex align-items-center gap-2">
                    <select id="role-{{ user.username }}" class="form-select form-select-sm" style="max-width: 140px;">
                      <option value="viewer" {% if user.role == 'viewer' %}selected{% endif %}>Viewer</option>
                      <option value="mod" {% if user.role == 'mod' %}selected{% endif %}>Mod</option>
                      <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Admin</option>
                    </select>
                    <button class="btn btn-sm btn-outline-primary" onclick="changeRole('{{ user.username }}')">Update</button>
                  </div>
                </td>
                <td>
                  <button class="btn btn-sm btn-outline-warning" onclick="resetPassword('{{ user.username }}')">Reset Password</button>
                  <button class="btn btn-sm btn-outline-danger" onclick="deleteUser('{{ user.username }}')">Delete</button>
                </td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
function setStatus(msg, ok=true) {
  const box = document.getElementById('status');
  box.innerHTML = `<div class="alert ${ok ? 'alert-success' : 'alert-danger'} py-2">${msg}</div>`;
}

async function postJson(url, payload) {
  const response = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  const data = await response.json();
  return { response, data };
}

document.getElementById('add-user-form').addEventListener('submit', async (e) => {
  e.preventDefault();

  const payload = {
    username: document.getElementById('add-username').value.trim(),
    password: document.getElementById('add-password').value,
    role: document.getElementById('add-role').value
  };

  const { response, data } = await postJson('/admin/users/add', payload);
  if (!response.ok || !data.success) {
    setStatus(data.error || 'Failed to create user.', false);
    return;
  }

  setStatus('User created.');
  setTimeout(() => location.reload(), 700);
});

async function resetPassword(username) {
  const password = prompt(`Enter new password for ${username} (min 8 chars):`);
  if (!password) return;

  const { response, data } = await postJson('/admin/users/password', { username, password });
  if (!response.ok || !data.success) {
    setStatus(data.error || 'Password reset failed.', false);
    return;
  }

  setStatus(`Password updated for ${username}.`);
}

async function changeRole(username) {
  const role = document.getElementById(`role-${username}`).value;

  const { response, data } = await postJson('/admin/users/role', { username, role });
  if (!response.ok || !data.success) {
    setStatus(data.error || 'Role update failed.', false);
    return;
  }

  setStatus(`Updated role for ${username} to ${role}.`);
}

async function deleteUser(username) {
  if (!confirm(`Delete user ${username}?`)) return;

  const { response, data } = await postJson('/admin/users/delete', { username });
  if (!response.ok || !data.success) {
    setStatus(data.error || 'Delete failed.', false);
    return;
  }

  setStatus(`Deleted ${username}.`);
  setTimeout(() => location.reload(), 700);
}
</script>
{% endblock %}
